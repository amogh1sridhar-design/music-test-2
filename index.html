<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina — Immersive Music Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,900;1,400&family=Bebas+Neue&family=Dancing+Script:wght@600;700&family=Raleway:wght@100;200;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Space Grotesk', sans-serif;
      cursor: none;
    }

    /* ─── Custom cursor ─── */
    #cursor {
      position: fixed;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%,-50%);
      transition: width 0.2s, height 0.2s, background 0.2s;
      mix-blend-mode: difference;
    }
    #cursor-ring {
      position: fixed;
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.4);
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%,-50%);
      transition: width 0.3s, height 0.3s, border-color 0.3s;
    }

    /* ─── Three.js canvas ─── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ─── Lyrics stage ─── */
    #lyrics-stage {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      overflow: hidden;
    }

    .lyric-line {
      position: absolute;
      text-align: center;
      max-width: 85vw;
      pointer-events: none;
      line-height: 1.1;
      opacity: 0;
      will-change: transform, opacity;
      white-space: pre-wrap;
    }

    /* ─── Frequency bars ─── */
    #freq-bars {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      z-index: 5;
      display: flex;
      align-items: flex-end;
      gap: 1px;
      padding: 0 1px;
      opacity: 0.25;
      pointer-events: none;
    }

    .freq-bar {
      flex: 1;
      background: linear-gradient(to top, #7b2fff, #00d4ff, #ff0090);
      border-radius: 2px 2px 0 0;
      min-height: 2px;
      transition: height 0.04s linear;
    }

    /* ─── UI panel ─── */
    #ui-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      padding: 24px 28px 28px;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.3) 60%, transparent 100%);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    #ui-panel.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
    }

    /* ─── Search ─── */
    #search-area {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      position: relative;
    }

    #search-input {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50px;
      padding: 13px 22px;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      outline: none;
      backdrop-filter: blur(12px);
      transition: border-color 0.2s, background 0.2s;
    }

    #search-input::placeholder { color: rgba(255,255,255,0.35); }
    #search-input:focus {
      border-color: rgba(123,47,255,0.7);
      background: rgba(255,255,255,0.12);
    }

    #search-btn {
      background: rgba(123,47,255,0.3);
      border: 1px solid rgba(123,47,255,0.5);
      border-radius: 50px;
      padding: 13px 26px;
      color: #fff;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 500;
      backdrop-filter: blur(12px);
      transition: background 0.2s, border-color 0.2s;
      white-space: nowrap;
    }

    #search-btn:hover {
      background: rgba(123,47,255,0.55);
      border-color: rgba(123,47,255,0.8);
    }

    /* ─── Search results ─── */
    #search-results {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 0; right: 0;
      background: rgba(8,6,24,0.92);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      backdrop-filter: blur(24px);
      max-height: 320px;
      overflow-y: auto;
      display: none;
      z-index: 200;
      box-shadow: 0 -20px 60px rgba(0,0,0,0.6);
    }

    #search-results.visible { display: block; }

    .track-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 18px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }

    .track-item:last-child { border-bottom: none; }
    .track-item:first-child { border-radius: 20px 20px 0 0; }
    .track-item:last-child { border-radius: 0 0 20px 20px; }
    .track-item:only-child { border-radius: 20px; }
    .track-item:hover { background: rgba(123,47,255,0.15); }

    .track-art {
      width: 46px; height: 46px;
      border-radius: 10px;
      object-fit: cover;
      background: rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    .track-info { flex: 1; min-width: 0; }

    .track-name {
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      color: rgba(255,255,255,0.45);
      font-size: 12px;
      margin-top: 3px;
    }

    .track-duration {
      color: rgba(255,255,255,0.3);
      font-size: 11px;
      flex-shrink: 0;
    }

    /* ─── Controls row ─── */
    #controls-row {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    /* ─── Now playing ─── */
    #now-playing {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 160px;
    }

    #now-art {
      width: 50px; height: 50px;
      border-radius: 12px;
      object-fit: cover;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    #now-title {
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #now-artist {
      color: rgba(255,255,255,0.45);
      font-size: 11px;
      margin-top: 3px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 160px;
    }

    /* ─── Playback ─── */
    #playback-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ctrl-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      padding: 10px;
      border-radius: 50%;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
    }

    .ctrl-btn:hover {
      background: rgba(255,255,255,0.18);
      color: #fff;
      border-color: rgba(255,255,255,0.25);
    }

    .ctrl-btn svg { width: 18px; height: 18px; fill: currentColor; }
    #play-btn { padding: 14px; }
    #play-btn svg { width: 22px; height: 22px; }

    /* ─── Progress ─── */
    #progress-area {
      flex: 2;
      min-width: 200px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .time-label {
      color: rgba(255,255,255,0.4);
      font-size: 11px;
      white-space: nowrap;
      min-width: 34px;
      font-variant-numeric: tabular-nums;
    }

    #progress-bar {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.12);
      border-radius: 4px;
      cursor: pointer;
      position: relative;
    }

    #progress-bar::after {
      content: '';
      position: absolute;
      inset: -6px;
    }

    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #7b2fff, #00d4ff);
      border-radius: 4px;
      width: 0%;
      pointer-events: none;
      position: relative;
    }

    #progress-fill::after {
      content: '';
      position: absolute;
      right: -4px; top: -4px;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 8px rgba(123,47,255,0.8);
    }

    /* ─── Volume ─── */
    #volume-area {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #vol-icon { color: rgba(255,255,255,0.45); display: flex; }
    #vol-icon svg { width: 16px; height: 16px; fill: currentColor; }

    #volume-slider {
      width: 80px;
      -webkit-appearance: none;
      height: 3px;
      background: rgba(255,255,255,0.18);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      box-shadow: 0 0 6px rgba(123,47,255,0.6);
    }

    /* ─── Theme selector ─── */
    #theme-selector {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .theme-btn {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.5);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      letter-spacing: 0.03em;
    }

    .theme-btn:hover {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.8);
    }

    .theme-btn.active {
      background: rgba(123,47,255,0.3);
      border-color: rgba(123,47,255,0.6);
      color: #fff;
    }

    /* ─── Scrollbar ─── */
    #search-results::-webkit-scrollbar { width: 4px; }
    #search-results::-webkit-scrollbar-track { background: transparent; }
    #search-results::-webkit-scrollbar-thumb { background: rgba(123,47,255,0.4); border-radius: 4px; }

    /* ─── Toast ─── */
    #toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: rgba(14,10,32,0.92);
      border: 1px solid rgba(123,47,255,0.4);
      border-radius: 50px;
      padding: 10px 22px;
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      z-index: 500;
      backdrop-filter: blur(16px);
      transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ─── Loading ─── */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    #loading.visible { opacity: 1; pointer-events: all; }

    .spinner {
      width: 44px; height: 44px;
      border: 2px solid rgba(123,47,255,0.2);
      border-top-color: rgba(123,47,255,0.9);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Lyrics info strip ─── */
    #lyrics-status {
      position: fixed;
      top: 20px; right: 22px;
      z-index: 110;
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: opacity 0.4s;
      pointer-events: none;
    }

    /* ─── Waveform rings ─── */
    #waveform-rings {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wave-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(123,47,255,0.2);
      opacity: 0;
      animation: none;
    }

    /* ─── Responsive ─── */
    @media (max-width: 700px) {
      #controls-row { gap: 12px; }
      #progress-area { min-width: 120px; }
      #volume-area { display: none; }
      #now-title, #now-artist { max-width: 100px; }
      #theme-selector { gap: 4px; }
      .theme-btn { padding: 6px 10px; font-size: 10px; }
    }
  </style>
</head>
<body>

  <div id="cursor"></div>
  <div id="cursor-ring"></div>

  <canvas id="bg-canvas"></canvas>

  <div id="lyrics-stage"></div>
  <div id="freq-bars"></div>
  <div id="waveform-rings"></div>
  <div id="lyrics-status"></div>
  <div id="loading"><div class="spinner"></div></div>
  <div id="toast"></div>

  <div id="ui-panel">
    <div id="search-area">
      <div id="search-results"></div>
      <input type="text" id="search-input" placeholder="Search for music on Jamendo…" autocomplete="off" spellcheck="false">
      <button id="search-btn">Search</button>
    </div>

    <div id="controls-row">
      <div id="now-playing">
        <img id="now-art" src="" alt="">
        <div>
          <div id="now-title">No track loaded</div>
          <div id="now-artist">Search above to begin</div>
        </div>
      </div>

      <div id="playback-controls">
        <button class="ctrl-btn" id="play-btn" title="Play / Pause (Space)">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
      </div>

      <div id="progress-area">
        <span class="time-label" id="time-current">0:00</span>
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <span class="time-label" id="time-total">0:00</span>
      </div>

      <div id="volume-area">
        <div id="vol-icon">
          <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        </div>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8">
      </div>

      <div id="theme-selector">
        <button class="theme-btn active" data-theme="0">✦ Vortex</button>
        <button class="theme-btn" data-theme="1">☁ Clouds</button>
        <button class="theme-btn" data-theme="2">◈ Crystal</button>
      </div>
    </div>
  </div>

  <audio id="player" crossorigin="anonymous" preload="auto"></audio>

  <script>
  // ════════════════════════════════════════════════
  // CONFIG
  // ════════════════════════════════════════════════
  const JAMENDO_CLIENT_ID = 'b6747d04'; // Free demo key — get your own at developer.jamendo.com

  const LYRIC_FONTS = [
    "'Playfair Display', serif",
    "'Bebas Neue', cursive",
    "'Dancing Script', cursive",
    "'Raleway', sans-serif",
    "'Space Grotesk', sans-serif",
    "'Playfair Display', serif",   // weighted double for elegance
  ];

  const LYRIC_ANIMS = ['scaleUp', 'slideLeft', 'slideRight', 'slideUp', 'slideDown', 'spinIn', 'glitch'];

  const THEME_COLORS = [
    { bg: [0.01, 0.003, 0.04],  accent: '#7b2fff', alt: '#00d4ff' },
    { bg: [0.0,  0.01,  0.05],  accent: '#00d4ff', alt: '#80e8ff' },
    { bg: [0.02, 0.0,   0.04],  accent: '#ff0090', alt: '#ffcc00' },
  ];

  // ════════════════════════════════════════════════
  // STATE
  // ════════════════════════════════════════════════
  let audioCtx, analyser, dataArray, bufferLength;
  let smoothBass = 0, smoothMid = 0, smoothTreble = 0;
  let rawBass = 0, rawMid = 0, rawTreble = 0;
  let lyrics = [], currentLyricIdx = -1;
  let currentTheme = 0, activeThemeObj = null;
  let isPlaying = false, uiHideTimer = null;
  let activeLyricEl = null;
  let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
  let cursorX = mouseX, cursorY = mouseY;
  let ringX = mouseX, ringY = mouseY;

  // ════════════════════════════════════════════════
  // ELEMENTS
  // ════════════════════════════════════════════════
  const canvas        = document.getElementById('bg-canvas');
  const lyricsStage   = document.getElementById('lyrics-stage');
  const uiPanel       = document.getElementById('ui-panel');
  const player        = document.getElementById('player');
  const searchInput   = document.getElementById('search-input');
  const searchBtn     = document.getElementById('search-btn');
  const searchResults = document.getElementById('search-results');
  const playBtn       = document.getElementById('play-btn');
  const progressBar   = document.getElementById('progress-bar');
  const progressFill  = document.getElementById('progress-fill');
  const timeCurrent   = document.getElementById('time-current');
  const timeTotal     = document.getElementById('time-total');
  const volumeSlider  = document.getElementById('volume-slider');
  const nowArt        = document.getElementById('now-art');
  const nowTitle      = document.getElementById('now-title');
  const nowArtist     = document.getElementById('now-artist');
  const loadingEl     = document.getElementById('loading');
  const toastEl       = document.getElementById('toast');
  const freqBarsEl    = document.getElementById('freq-bars');
  const lyricsStatus  = document.getElementById('lyrics-status');
  const waveRingsEl   = document.getElementById('waveform-rings');
  const cursorDot     = document.getElementById('cursor');
  const cursorRing    = document.getElementById('cursor-ring');

  // ════════════════════════════════════════════════
  // THREE.JS RENDERER
  // ════════════════════════════════════════════════
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x030010, 1);

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 2000);
  camera.position.z = 35;

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ════════════════════════════════════════════════
  // CUSTOM CURSOR
  // ════════════════════════════════════════════════
  document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  function animateCursor() {
    cursorX += (mouseX - cursorX) * 0.25;
    cursorY += (mouseY - cursorY) * 0.25;
    ringX   += (mouseX - ringX)   * 0.1;
    ringY   += (mouseY - ringY)   * 0.1;

    cursorDot.style.left  = cursorX + 'px';
    cursorDot.style.top   = cursorY + 'px';
    cursorRing.style.left = ringX + 'px';
    cursorRing.style.top  = ringY + 'px';

    // Scale ring with bass
    const s = 1 + smoothBass * 1.5;
    cursorRing.style.transform = `translate(-50%,-50%) scale(${s})`;
    cursorRing.style.borderColor = `rgba(123,47,255,${0.3 + smoothBass * 0.5})`;

    requestAnimationFrame(animateCursor);
  }
  animateCursor();

  // ════════════════════════════════════════════════
  // FREQUENCY BARS UI
  // ════════════════════════════════════════════════
  const NUM_BARS = 80;
  for (let i = 0; i < NUM_BARS; i++) {
    const b = document.createElement('div');
    b.className = 'freq-bar';
    freqBarsEl.appendChild(b);
  }
  const freqBarEls = Array.from(freqBarsEl.children);

  function updateFreqBars(data) {
    if (!data) return;
    const step = Math.floor(data.length / NUM_BARS);
    for (let i = 0; i < NUM_BARS; i++) {
      const v = data[i * step] / 255;
      freqBarEls[i].style.height = Math.max(2, v * 78) + 'px';
      freqBarEls[i].style.opacity = 0.3 + v * 0.7;
    }
  }

  // ════════════════════════════════════════════════
  // WAVEFORM RINGS
  // ════════════════════════════════════════════════
  const rings = [];
  let ringTimer = 0;

  function spawnRing(bass) {
    const ring = document.createElement('div');
    ring.className = 'wave-ring';
    const size = 60 + bass * 200;
    ring.style.cssText = `width:${size}px;height:${size}px;border-color:rgba(123,47,255,${0.3 + bass * 0.5})`;
    waveRingsEl.appendChild(ring);

    gsap.fromTo(ring,
      { scale: 0.8, opacity: 0.6 + bass * 0.3 },
      {
        scale: 4 + bass * 3,
        opacity: 0,
        duration: 2 + (1 - bass) * 2,
        ease: 'power2.out',
        onComplete: () => ring.remove()
      }
    );
  }

  // ════════════════════════════════════════════════
  // THEME 1: NEON PARTICLE VORTEX
  // ════════════════════════════════════════════════
  function createNeonVortexTheme() {
    const group = new THREE.Group();
    const COUNT = 7000;

    const positions = new Float32Array(COUNT * 3);
    const colors    = new Float32Array(COUNT * 3);
    const angles    = new Float32Array(COUNT);
    const radii     = new Float32Array(COUNT);
    const yPos      = new Float32Array(COUNT);
    const speeds    = new Float32Array(COUNT);
    const layers    = new Float32Array(COUNT); // 0=inner 1=outer

    for (let i = 0; i < COUNT; i++) {
      const r     = 1 + Math.pow(Math.random(), 0.7) * 30;
      const angle = Math.random() * Math.PI * 2;
      const y     = (Math.random() - 0.5) * (r * 0.6 + 2);

      angles[i]  = angle;
      radii[i]   = r;
      yPos[i]    = y;
      speeds[i]  = (0.3 + Math.random() * 0.7) * (1 + (30 - r) / 30);
      layers[i]  = r < 10 ? 0 : 1;

      positions[i*3]   = Math.cos(angle) * r;
      positions[i*3+1] = y;
      positions[i*3+2] = Math.sin(angle) * r;

      const t = r / 30;
      colors[i*3]   = 0.48 + (1-t)*0.52;
      colors[i*3+1] = t * 0.8;
      colors[i*3+2] = 1.0;
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));

    const mat = new THREE.PointsMaterial({
      size: 0.14,
      vertexColors: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      transparent: true,
      opacity: 0.85,
      sizeAttenuation: true,
    });

    const points = new THREE.Points(geo, mat);
    group.add(points);

    // Central glow sphere
    const coreMat = new THREE.MeshBasicMaterial({
      color: 0x7b2fff,
      transparent: true,
      opacity: 0.08,
      blending: THREE.AdditiveBlending,
    });
    const coreGeo  = new THREE.SphereGeometry(3, 16, 16);
    const coreMesh = new THREE.Mesh(coreGeo, coreMat);
    group.add(coreMesh);

    scene.add(group);

    let time = 0;

    function update(bass, mid, treble) {
      time += 0.008 + treble * 0.025 + mid * 0.01;

      const pos = geo.attributes.position.array;
      const col = geo.attributes.color.array;
      const bassBoost = 1 + bass * 0.6;

      for (let i = 0; i < COUNT; i++) {
        angles[i] += speeds[i] * 0.008 * (1 + treble * 2.5) * (layers[i] === 0 ? 1.5 : 0.8);

        const pulse = radii[i] * bassBoost * (1 + 0.15 * Math.sin(time * 3 + i * 0.005));
        const drift = Math.sin(time * 0.4 + i * 0.02) * 0.008;

        pos[i*3]   = Math.cos(angles[i]) * pulse;
        pos[i*3+1] = yPos[i] + Math.sin(time * 0.7 + i * 0.1) * 0.05;
        pos[i*3+2] = Math.sin(angles[i]) * pulse;

        yPos[i] += drift;
        if (Math.abs(yPos[i]) > radii[i] * 0.4 + 2) yPos[i] *= 0.98;

        // Hue cycle driven by treble and time
        const hue  = (radii[i] / 30 + treble * 0.4 + time * 0.04) % 1;
        const sat  = 0.8 + bass * 0.2;
        const r = Math.abs(Math.sin(hue * Math.PI * 2 + 0));
        const g = Math.abs(Math.sin(hue * Math.PI * 2 + 2.09));
        const b = Math.abs(Math.sin(hue * Math.PI * 2 + 4.19));
        col[i*3]   = r * sat + (1-sat);
        col[i*3+1] = g * sat;
        col[i*3+2] = b * sat + (1-sat) * 0.5;
      }

      geo.attributes.position.needsUpdate = true;
      geo.attributes.color.needsUpdate    = true;

      mat.size   = 0.1 + bass * 0.28 + treble * 0.06;
      mat.opacity = 0.7 + bass * 0.25;

      group.rotation.y += 0.003 + treble * 0.01 + mid * 0.004;
      group.rotation.x  = Math.sin(time * 0.25) * 0.12;
      group.rotation.z  = Math.cos(time * 0.18) * 0.05;

      coreMat.opacity = 0.05 + bass * 0.25;
      coreMesh.scale.setScalar(1 + bass * 1.5);

      const bg = THEME_COLORS[0].bg;
      renderer.setClearColor(new THREE.Color(bg[0] + bass*0.06, bg[1] + mid*0.01, bg[2] + treble*0.05), 1);
    }

    function dispose() {
      geo.dispose(); mat.dispose();
      coreGeo.dispose(); coreMat.dispose();
      scene.remove(group);
    }

    return { update, dispose };
  }

  // ════════════════════════════════════════════════
  // THEME 2: VOLUMETRIC CLOUDSCAPE
  // ════════════════════════════════════════════════
  function createCloudscapeTheme() {
    const group = new THREE.Group();

    // Cloud layer
    const CLOUD_COUNT = 4000;
    const cPos = new Float32Array(CLOUD_COUNT * 3);
    const cCol = new Float32Array(CLOUD_COUNT * 3);

    for (let i = 0; i < CLOUD_COUNT; i++) {
      cPos[i*3]   = (Math.random() - 0.5) * 140;
      cPos[i*3+1] = (Math.random() - 0.5) * 60;
      cPos[i*3+2] = -Math.random() * 300;

      const bright = 0.15 + Math.random() * 0.55;
      cCol[i*3]   = bright * 0.55;
      cCol[i*3+1] = bright * 0.65;
      cCol[i*3+2] = bright;
    }

    const cloudGeo = new THREE.BufferGeometry();
    cloudGeo.setAttribute('position', new THREE.BufferAttribute(cPos, 3));
    cloudGeo.setAttribute('color',    new THREE.BufferAttribute(cCol, 3));

    const cloudMat = new THREE.PointsMaterial({
      size: 2.8,
      vertexColors: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      transparent: true,
      opacity: 0.55,
      sizeAttenuation: true,
    });

    const cloudPoints = new THREE.Points(cloudGeo, cloudMat);
    group.add(cloudPoints);

    // Star layer
    const STAR_COUNT = 2000;
    const sPos = new Float32Array(STAR_COUNT * 3);
    for (let i = 0; i < STAR_COUNT; i++) {
      sPos[i*3]   = (Math.random() - 0.5) * 300;
      sPos[i*3+1] = (Math.random() - 0.5) * 200;
      sPos[i*3+2] = -100 - Math.random() * 400;
    }
    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
    const starMat = new THREE.PointsMaterial({
      size: 0.4,
      color: 0xffffff,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      transparent: true,
      opacity: 0.7,
    });
    const stars = new THREE.Points(starGeo, starMat);
    group.add(stars);

    // Lightning flash light
    const lightningLight = new THREE.PointLight(0x4488ff, 0, 200);
    lightningLight.position.set(0, 20, -50);
    group.add(lightningLight);

    const ambLight = new THREE.AmbientLight(0x1a2a4a, 1);
    group.add(ambLight);

    scene.add(group);
    scene.fog = new THREE.FogExp2(0x000a14, 0.004);

    let time = 0;
    let lightningVal = 0;
    let prevBass = 0;
    const cameraBaseZ = camera.position.z;

    function update(bass, mid, treble) {
      time += 0.01;

      const speed = 0.35 + mid * 4 + bass * 1.5;
      const positions = cloudGeo.attributes.position.array;
      const cloudColors = cloudGeo.attributes.color.array;

      for (let i = 0; i < CLOUD_COUNT; i++) {
        positions[i*3+2] += speed * 0.18;
        if (positions[i*3+2] > camera.position.z + 30) {
          positions[i*3]   = (Math.random() - 0.5) * 140;
          positions[i*3+1] = (Math.random() - 0.5) * 60;
          positions[i*3+2] = camera.position.z - 280;
        }

        // Color temp: warm with heavy bass, cool otherwise
        const warm  = bass * 0.6 + mid * 0.2;
        const bright = 0.15 + Math.random() * 0.01;
        cloudColors[i*3]   = bright * (0.5 + warm * 0.8);
        cloudColors[i*3+1] = bright * (0.6 + treble * 0.3);
        cloudColors[i*3+2] = bright * (1.0 - warm * 0.4);
      }

      cloudGeo.attributes.position.needsUpdate = true;
      cloudGeo.attributes.color.needsUpdate    = true;

      // Lightning on sudden bass hits
      const bassDelta = bass - prevBass;
      if (bassDelta > 0.15 && Math.random() < 0.6) {
        lightningVal = bass * 5;
        lightningLight.position.set(
          (Math.random() - 0.5) * 60,
          10 + Math.random() * 30,
          camera.position.z - 30 - Math.random() * 60
        );
      }
      lightningVal *= 0.82;
      lightningLight.intensity = lightningVal;
      lightningLight.color.setHSL(0.58 + mid * 0.15, 1, 0.8);
      prevBass = bass;

      // Camera gentle sway
      camera.position.x = Math.sin(time * 0.25) * 6 + Math.sin(time * 0.1) * 2;
      camera.position.y = Math.cos(time * 0.18) * 3 + bass * 1.5;
      camera.rotation.z = Math.sin(time * 0.15) * 0.04;
      camera.lookAt(camera.position.x, camera.position.y, camera.position.z - 100);

      cloudMat.size    = 2.2 + bass * 2 + mid;
      cloudMat.opacity = 0.45 + bass * 0.25;

      const bg = THEME_COLORS[1].bg;
      renderer.setClearColor(new THREE.Color(bg[0], bg[1] + mid*0.02, bg[2] + (1-bass)*0.02), 1);
    }

    function dispose() {
      cloudGeo.dispose(); cloudMat.dispose();
      starGeo.dispose();  starMat.dispose();
      scene.remove(group);
      scene.fog = null;
      camera.position.set(0, 0, 35);
      camera.rotation.set(0, 0, 0);
      camera.lookAt(0, 0, 0);
    }

    return { update, dispose };
  }

  // ════════════════════════════════════════════════
  // THEME 3: CRYSTAL GEOMETRY + LASERS
  // ════════════════════════════════════════════════
  function createCrystalTheme() {
    const group = new THREE.Group();
    const shapeGeos = [
      new THREE.IcosahedronGeometry(5, 0),
      new THREE.OctahedronGeometry(5, 0),
      new THREE.TetrahedronGeometry(5, 0),
      new THREE.DodecahedronGeometry(4, 0),
      new THREE.IcosahedronGeometry(3, 1),
    ];

    const configs = [
      { pos: [0,0,0],     scale: 1.0 },
      { pos: [-16,4,-10], scale: 0.7 },
      { pos: [16,-4,-10], scale: 0.7 },
      { pos: [0, 16,-12], scale: 0.6 },
      { pos: [0,-16,-12], scale: 0.6 },
    ];

    const meshObjs = configs.map((cfg, i) => {
      const geo     = shapeGeos[i].clone();
      const edgeGeo = new THREE.EdgesGeometry(geo);

      const wireMat = new THREE.LineBasicMaterial({
        color: new THREE.Color().setHSL(i/5, 1, 0.75),
        transparent: true, opacity: 0.9,
        blending: THREE.AdditiveBlending,
      });

      const faceMat = new THREE.MeshBasicMaterial({
        color: new THREE.Color().setHSL(i/5, 0.8, 0.12),
        transparent: true, opacity: 0.25,
        side: THREE.DoubleSide,
        blending: THREE.AdditiveBlending,
      });

      const wire  = new THREE.LineSegments(edgeGeo, wireMat);
      const face  = new THREE.Mesh(geo, faceMat);
      const cont  = new THREE.Group();
      cont.add(face, wire);
      cont.position.set(...cfg.pos);
      cont.scale.setScalar(cfg.scale);
      group.add(cont);

      return { cont, wire, face, wireMat, faceMat, geo, edgeGeo, hueBase: i/5 };
    });

    // Laser beams
    const NUM_LASERS = 30;
    const laserObjs = [];

    for (let i = 0; i < NUM_LASERS; i++) {
      const pts = [
        new THREE.Vector3((Math.random()-0.5)*80, (Math.random()-0.5)*80, -40),
        new THREE.Vector3((Math.random()-0.5)*15, (Math.random()-0.5)*15, 10),
      ];
      const lGeo = new THREE.BufferGeometry().setFromPoints(pts);
      const lMat = new THREE.LineBasicMaterial({
        color: new THREE.Color().setHSL(i/NUM_LASERS, 1, 0.85),
        transparent: true, opacity: 0,
        blending: THREE.AdditiveBlending,
      });
      const laser = new THREE.Line(lGeo, lMat);
      group.add(laser);
      laserObjs.push({ laser, lMat, hue: i/NUM_LASERS });
    }

    // Particle ring
    const RING_COUNT = 3000;
    const rPos = new Float32Array(RING_COUNT * 3);
    const rCol = new Float32Array(RING_COUNT * 3);
    const rAng = new Float32Array(RING_COUNT);
    const rRad = new Float32Array(RING_COUNT);

    for (let i = 0; i < RING_COUNT; i++) {
      const r = 20 + Math.random() * 20;
      const a = Math.random() * Math.PI * 2;
      rAng[i] = a; rRad[i] = r;
      rPos[i*3]   = Math.cos(a) * r;
      rPos[i*3+1] = (Math.random()-0.5) * 3;
      rPos[i*3+2] = Math.sin(a) * r;
      rCol[i*3] = 1; rCol[i*3+1] = 0.3; rCol[i*3+2] = 0.8;
    }

    const ringGeo = new THREE.BufferGeometry();
    ringGeo.setAttribute('position', new THREE.BufferAttribute(rPos, 3));
    ringGeo.setAttribute('color',    new THREE.BufferAttribute(rCol, 3));
    const ringMat = new THREE.PointsMaterial({
      size: 0.18, vertexColors: true,
      blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, opacity: 0.7,
    });
    group.add(new THREE.Points(ringGeo, ringMat));

    scene.add(group);

    let time = 0;

    function update(bass, mid, treble) {
      time += 0.012;

      meshObjs.forEach((m, i) => {
        m.cont.rotation.x += 0.006 + bass * 0.04 + treble * 0.02;
        m.cont.rotation.y += 0.01  + mid  * 0.03 + treble * 0.015;
        m.cont.rotation.z += 0.004 + bass * 0.02;
        m.cont.scale.setScalar(configs[i].scale * (1 + bass * 0.45 * Math.sin(time*2+i)));

        const hue = (m.hueBase + time * 0.04 + treble * 0.25) % 1;
        m.wireMat.color.setHSL(hue, 1, 0.75);
        m.wireMat.opacity = 0.6 + bass * 0.4;
        m.faceMat.color.setHSL(hue, 0.8, 0.08 + bass*0.18);
        m.faceMat.opacity = 0.12 + bass * 0.3;
      });

      group.rotation.y += 0.004 + mid * 0.012;
      group.rotation.x  = Math.sin(time * 0.22) * 0.18;

      // Lasers fire with treble
      laserObjs.forEach((l, i) => {
        const flash = treble > 0.35 ? Math.pow(treble, 1.5) * Math.random() : 0;
        l.lMat.opacity = flash * 0.85;
        l.lMat.color.setHSL((l.hue + time*0.08) % 1, 1, 0.9);
      });

      // Particle ring
      const rPosArr = ringGeo.attributes.position.array;
      const rColArr = ringGeo.attributes.color.array;
      for (let i = 0; i < RING_COUNT; i++) {
        rAng[i] += 0.003 * (1 + treble * 3) * (i % 2 === 0 ? 1 : -1);
        const r = rRad[i] * (1 + bass * 0.25);
        rPosArr[i*3]   = Math.cos(rAng[i]) * r;
        rPosArr[i*3+2] = Math.sin(rAng[i]) * r;
        const h = (i/RING_COUNT + time*0.05 + treble*0.3) % 1;
        rColArr[i*3]   = Math.abs(Math.sin(h*Math.PI*2));
        rColArr[i*3+1] = Math.abs(Math.sin(h*Math.PI*2 + 2.09));
        rColArr[i*3+2] = Math.abs(Math.sin(h*Math.PI*2 + 4.19));
      }
      ringGeo.attributes.position.needsUpdate = true;
      ringGeo.attributes.color.needsUpdate    = true;

      ringMat.size    = 0.15 + bass * 0.2;
      ringMat.opacity = 0.5 + treble * 0.4;

      const bg = THEME_COLORS[2].bg;
      renderer.setClearColor(new THREE.Color(bg[0] + bass*0.05, bg[1], bg[2] + treble*0.06), 1);
    }

    function dispose() {
      meshObjs.forEach(m => { m.geo.dispose(); m.edgeGeo.dispose(); m.wireMat.dispose(); m.faceMat.dispose(); });
      laserObjs.forEach(l => { l.laser.geometry.dispose(); l.lMat.dispose(); });
      ringGeo.dispose(); ringMat.dispose();
      scene.remove(group);
    }

    return { update, dispose };
  }

  const THEME_FACTORIES = [createNeonVortexTheme, createCloudscapeTheme, createCrystalTheme];

  function setTheme(idx) {

    scene.fog = null;

    camera.position.set(0, 0, 35);
    camera.rotation.set(0, 0, 0);
    camera.lookAt(0, 0, 0);

    currentTheme  = idx;
    activeThemeObj = THEME_FACTORIES[idx]();

    document.querySelectorAll('.theme-btn').forEach((b,i) => b.classList.toggle('active', i === idx));
    showToast(['✦ Neon Vortex', '☁ Cloudscape', '◈ Crystal Geometry'][idx]);
  }

  // ════════════════════════════════════════════════
  // AUDIO
  // ════════════════════════════════════════════════
  function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser  = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.82;
    bufferLength = analyser.frequencyBinCount;
    dataArray    = new Uint8Array(bufferLength);

    const src = audioCtx.createMediaElementSource(player);
    src.connect(analyser);
    analyser.connect(audioCtx.destination);
  }

  function getFrequencies() {
    if (!analyser) return { bass: 0, mid: 0, treble: 0 };

    analyser.getByteFrequencyData(dataArray);

    const nyq    = audioCtx.sampleRate / 2;
    const binHz  = nyq / bufferLength;
    const bassEnd   = Math.floor(250   / binHz);
    const midEnd    = Math.floor(4000  / binHz);
    const trebleEnd = Math.floor(12000 / binHz);

    let bSum = 0, mSum = 0, tSum = 0;
    for (let i = 1;       i < bassEnd;   i++) bSum += dataArray[i];
    for (let i = bassEnd; i < midEnd;    i++) mSum += dataArray[i];
    for (let i = midEnd;  i < trebleEnd; i++) tSum += dataArray[i];

    rawBass   = (bSum / Math.max(1, bassEnd - 1)) / 255;
    rawMid    = (mSum / Math.max(1, midEnd - bassEnd)) / 255;
    rawTreble = (tSum / Math.max(1, trebleEnd - midEnd)) / 255;

    const S = 0.18;
    smoothBass   += (rawBass   - smoothBass)   * S;
    smoothMid    += (rawMid    - smoothMid)    * S;
    smoothTreble += (rawTreble - smoothTreble) * S;

    updateFreqBars(dataArray);

    return { bass: smoothBass, mid: smoothMid, treble: smoothTreble };
  }

  // ════════════════════════════════════════════════
  // JAMENDO API
  // ════════════════════════════════════════════════
  async function searchJamendo(q) {
    const url = `https://api.jamendo.com/v3.0/tracks/?client_id=${JAMENDO_CLIENT_ID}`
      + `&format=json&limit=20&search=${encodeURIComponent(q)}`
      + `&include=musicinfo&audioformat=mp31&imagesize=100`;
    const res  = await fetch(url);
    if (!res.ok) throw new Error('Jamendo API error');
    const data = await res.json();
    return data.results || [];
  }

  async function loadTrack(track) {
    showLoading(true);

    // Audio element
    player.src = track.audio || '';
    player.volume = parseFloat(volumeSlider.value);
    player.crossOrigin = 'anonymous';

    // Now-playing strip
    nowTitle.textContent  = track.name;
    nowArtist.textContent = track.artist_name;
    if (track.image) { nowArt.src = track.image; nowArt.style.opacity = '1'; }

    // Reset lyrics
    lyrics = []; currentLyricIdx = -1;
    clearLyrics();

    // Fetch lyrics
    try {
      const lrc = await fetchLyrics(track.artist_name, track.name, track.album_name, track.duration);
      if (lrc) {
        lyrics = parseLRC(lrc);
        lyricsStatus.textContent = lyrics.length ? `${lyrics.length} lyric lines synced` : '';
        showToast(lyrics.length ? `♪ Lyrics synced — ${lyrics.length} lines` : '♪ No synced lyrics found');
      } else {
        lyricsStatus.textContent = 'No lyrics';
        showToast('♪ No lyrics found for this track');
      }
    } catch(e) {
      console.warn('Lyrics error', e);
    }

    // Start audio
    if (!audioCtx) initAudio();
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    try {
      await player.play();
      setPlayState(true);
    } catch(e) {
      console.error('Playback error:', e);
      showToast('Playback blocked — click play manually');
    }

    showLoading(false);
  }

  // ════════════════════════════════════════════════
  // LRCLIB
  // ════════════════════════════════════════════════
  async function fetchLyrics(artist, title, album, duration) {
    const params = new URLSearchParams({ artist_name: artist, track_name: title });
    if (album)    params.set('album_name', album);
    if (duration) params.set('duration', Math.round(duration));

    try {
      // Exact match
      let res = await fetch(`https://lrclib.net/api/get?${params}`);
      if (res.ok) {
        const d = await res.json();
        if (d.syncedLyrics) return d.syncedLyrics;
        if (d.plainLyrics)  return null; // plain lyrics have no timestamps — skip
      }

      // Fuzzy search
      res = await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(title + ' ' + artist)}`);
      if (res.ok) {
        const results = await res.json();
        for (const r of results) {
          if (r.syncedLyrics) return r.syncedLyrics;
        }
      }
    } catch(e) {
      console.warn('LRCLIB error:', e);
    }
    return null;
  }

  function parseLRC(lrc) {
    const timeRe = /\[(\d{1,2}):(\d{2}(?:\.\d+)?)\]/g;
    const result = [];

    for (const rawLine of lrc.split('\n')) {
      const text = rawLine.replace(/\[\d{1,2}:\d{2}(?:\.\d+)?\]/g, '').trim();
      if (!text) continue;
      timeRe.lastIndex = 0;
      let m;
      while ((m = timeRe.exec(rawLine)) !== null) {
        result.push({ time: +m[1] * 60 + +m[2], text });
      }
    }

    return result.sort((a,b) => a.time - b.time);
  }

  // ════════════════════════════════════════════════
  // LYRIC DISPLAY
  // ════════════════════════════════════════════════
  const LYRIC_COLORS_LIST = [
    '#ffffff', '#d4b8ff', '#80eaff', '#ffb3e6',
    '#b3ffd6', '#ffd6b3', '#e8ffb3',
  ];

  // Track recently used to avoid repetition
  let lastFont = -1, lastColor = -1, lastAnim = -1;

  function pickRand(arr, lastIdx) {
    let idx;
    do { idx = Math.floor(Math.random() * arr.length); } while (idx === lastIdx && arr.length > 1);
    return idx;
  }

  function clearLyrics() {
    Array.from(lyricsStage.children).forEach(el => {
      gsap.killTweensOf(el);
      el.remove();
    });
    activeLyricEl = null;
  }

  function showLyric(text, bassVal) {
    // Fade out previous
    if (activeLyricEl) {
      const old = activeLyricEl;
      gsap.to(old, {
        opacity: 0, duration: 0.55, ease: 'power2.in',
        onComplete: () => old.remove(),
      });
    }

    const el = document.createElement('div');
    el.className = 'lyric-line';
    el.textContent = text;

    const fontIdx  = pickRand(LYRIC_FONTS, lastFont);
    const colorIdx = pickRand(LYRIC_COLORS_LIST, lastColor);
    const animIdx  = pickRand(LYRIC_ANIMS, lastAnim);
    lastFont = fontIdx; lastColor = colorIdx; lastAnim = animIdx;

    const font  = LYRIC_FONTS[fontIdx];
    const color = LYRIC_COLORS_LIST[colorIdx];
    const anim  = LYRIC_ANIMS[animIdx];
    const size  = 22 + Math.random() * 42;
    const fw    = [300, 400, 700, 900][Math.floor(Math.random() * 4)];

    el.style.fontFamily   = font;
    el.style.color        = color;
    el.style.fontSize     = size + 'px';
    el.style.fontWeight   = fw;
    el.style.mixBlendMode = 'screen';
    el.style.textShadow   = `0 0 30px ${color}, 0 0 80px ${color}, 0 0 2px rgba(255,255,255,0.5)`;
    el.style.letterSpacing = Math.random() > 0.5 ? '0.08em' : '0.02em';

    // Slight random position variance
    const xOff = (Math.random() - 0.5) * 24;
    const yOff = (Math.random() - 0.5) * 28;
    el.style.left      = `calc(50% + ${xOff}%)`;
    el.style.top       = `calc(50% + ${yOff}%)`;
    el.style.transform = 'translate(-50%, -50%)';

    lyricsStage.appendChild(el);
    activeLyricEl = el;

    // Entry animations
    const dur   = 0.65;
    const ease1 = 'back.out(1.6)';
    const ease2 = 'power3.out';

    if      (anim === 'scaleUp')    gsap.fromTo(el, { opacity:0, scale:0.2, rotate:-8  }, { opacity:1, scale:1, rotate:0, duration:dur, ease:ease1 });
    else if (anim === 'slideLeft')  gsap.fromTo(el, { opacity:0, x:-180 }, { opacity:1, x:0, duration:dur, ease:ease2 });
    else if (anim === 'slideRight') gsap.fromTo(el, { opacity:0, x: 180 }, { opacity:1, x:0, duration:dur, ease:ease2 });
    else if (anim === 'slideUp')    gsap.fromTo(el, { opacity:0, y:  90 }, { opacity:1, y:0, duration:dur, ease:ease2 });
    else if (anim === 'slideDown')  gsap.fromTo(el, { opacity:0, y: -90 }, { opacity:1, y:0, duration:dur, ease:ease2 });
    else if (anim === 'spinIn')     gsap.fromTo(el, { opacity:0, scale:0.5, rotate:-25 }, { opacity:1, scale:1, rotate:0, duration:0.8, ease:ease1 });
    else if (anim === 'glitch') {
      gsap.fromTo(el, { opacity:0, skewX:12, x:-30 }, { opacity:1, skewX:0, x:0, duration:0.5, ease:'power4.out' });
      gsap.fromTo(el, { filter:'hue-rotate(120deg)' }, { filter:'hue-rotate(0deg)', duration:0.4 });
    }
  }

  function syncLyrics(t) {
    if (!lyrics.length) return;
    let idx = -1;
    for (let i = 0; i < lyrics.length; i++) {
      if (lyrics[i].time <= t) idx = i;
      else break;
    }
    if (idx !== currentLyricIdx && idx >= 0) {
      currentLyricIdx = idx;
      showLyric(lyrics[idx].text, smoothBass);
    }
  }

  function pulseLyrics(bass) {
    if (!activeLyricEl) return;
    const glow = 25 + bass * 55;
    const col  = activeLyricEl.style.color || '#ffffff';
    activeLyricEl.style.textShadow =
      `0 0 ${glow}px ${col}, 0 0 ${glow*2}px ${col}, 0 0 2px rgba(255,255,255,0.4)`;
  }

  // ════════════════════════════════════════════════
  // UI: AUTO-HIDE
  // ════════════════════════════════════════════════
  function showUI() {
    uiPanel.classList.remove('hidden');
    clearTimeout(uiHideTimer);
    uiHideTimer = setTimeout(() => uiPanel.classList.add('hidden'), 3200);
  }

  document.addEventListener('mousemove', showUI);
  document.addEventListener('touchstart', showUI);
  showUI();

  // ════════════════════════════════════════════════
  // UI: SEARCH
  // ════════════════════════════════════════════════
  async function doSearch() {
    const q = searchInput.value.trim();
    if (!q) return;
    showLoading(true);
    try {
      const tracks = await searchJamendo(q);
      renderResults(tracks);
    } catch(e) {
      showToast('Search failed — check your connection');
    }
    showLoading(false);
  }

  searchBtn.addEventListener('click', doSearch);
  searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  function renderResults(tracks) {
    searchResults.innerHTML = '';
    if (!tracks.length) {
      searchResults.innerHTML = '<div style="padding:18px;color:rgba(255,255,255,0.35);text-align:center;font-size:13px">No results found</div>';
      searchResults.classList.add('visible');
      return;
    }

    tracks.forEach(t => {
      const item = document.createElement('div');
      item.className = 'track-item';
      item.innerHTML = `
        <img class="track-art" src="${t.image||''}" alt="" onerror="this.style.opacity='0'">
        <div class="track-info">
          <div class="track-name">${esc(t.name)}</div>
          <div class="track-artist">${esc(t.artist_name)}</div>
        </div>
        <span class="track-duration">${fmtTime(t.duration)}</span>
      `;
      item.addEventListener('click', () => {
        searchResults.classList.remove('visible');
        loadTrack(t);
      });
      searchResults.appendChild(item);
    });

    searchResults.classList.add('visible');
  }

  document.addEventListener('click', e => {
    if (!searchResults.contains(e.target) && e.target !== searchInput && e.target !== searchBtn) {
      searchResults.classList.remove('visible');
    }
  });

  // ════════════════════════════════════════════════
  // UI: PLAYBACK
  // ════════════════════════════════════════════════
  playBtn.addEventListener('click', async () => {
    if (!player.src) return;
    if (!audioCtx) initAudio();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    isPlaying ? player.pause() : player.play();
  });

  document.addEventListener('keydown', async e => {
    if (e.code === 'Space' && document.activeElement !== searchInput) {
      e.preventDefault();
      if (!player.src) return;
      if (!audioCtx) initAudio();
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      isPlaying ? player.pause() : player.play();
    }
  });

  player.addEventListener('play',  () => setPlayState(true));
  player.addEventListener('pause', () => setPlayState(false));
  player.addEventListener('ended', () => setPlayState(false));

  function setPlayState(p) {
    isPlaying = p;
    playBtn.innerHTML = p
      ? `<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`
      : `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
  }

  player.addEventListener('timeupdate', () => {
    if (!player.duration) return;
    const pct = player.currentTime / player.duration;
    progressFill.style.width = (pct * 100) + '%';
    timeCurrent.textContent  = fmtTime(player.currentTime);
    timeTotal.textContent    = fmtTime(player.duration);
    syncLyrics(player.currentTime);
  });

  progressBar.addEventListener('click', e => {
    if (!player.duration) return;
    const rect = progressBar.getBoundingClientRect();
    player.currentTime = ((e.clientX - rect.left) / rect.width) * player.duration;
  });

  volumeSlider.addEventListener('input', () => { player.volume = +volumeSlider.value; });

  document.querySelectorAll('.theme-btn').forEach((b,i) => b.addEventListener('click', () => setTheme(i)));

  // ════════════════════════════════════════════════
  // HELPERS
  // ════════════════════════════════════════════════
  function showLoading(v) { loadingEl.classList.toggle('visible', v); }

  let toastTmr;
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTmr);
    toastTmr = setTimeout(() => toastEl.classList.remove('show'), 3200);
  }

  function fmtTime(s) {
    if (!s || isNaN(s)) return '0:00';
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2,'0')}`;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ════════════════════════════════════════════════
  // ANIMATION LOOP
  // ════════════════════════════════════════════════
  let prevBassForRing = 0;

  function animate() {
    requestAnimationFrame(animate);

    const { bass, mid, treble } = getFrequencies();

    if (activeThemeObj) activeThemeObj.update(bass, mid, treble);

    pulseLyrics(bass);

    // Spawn ring bursts on bass hits
    if (isPlaying) {
      ringTimer -= 1;
      const bassDelta = bass - prevBassForRing;
      if (bassDelta > 0.12 && ringTimer <= 0) {
        spawnRing(bass);
        ringTimer = 20 + (1-bass)*30;
      }
      prevBassForRing = bass;
    }

    renderer.render(scene, camera);
  }

  // ════════════════════════════════════════════════
  // INIT
  // ════════════════════════════════════════════════
  setTheme(0);
  animate();
  showToast('Welcome to Lumina — search for music above to begin');
  </script>
</body>
</html>
